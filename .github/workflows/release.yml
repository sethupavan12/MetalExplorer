name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Build release artifacts
        run: npm run build && npx electron-builder --mac dmg zip --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Checksums
        run: |
          cd release
          shasum -a 256 MetalExplorer-* > SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MetalExplorer-macOS
          path: |
            release/MetalExplorer-*
            release/SHA256SUMS.txt

      - name: Create draft GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/MetalExplorer-* release/SHA256SUMS.txt --clobber
          else
            gh release create "$GITHUB_REF_NAME" release/MetalExplorer-* release/SHA256SUMS.txt \
              --title "MetalExplorer $GITHUB_REF_NAME" \
              --notes-file CHANGELOG.md \
              --prerelease
          fi
